name: Build Windows

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Windows SDK 10.0.22621
        shell: pwsh
        run: |
          $installer = "$env:TEMP\winsdksetup.exe"
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?linkid=2196241" -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "/features + /q /ceip off" -Wait

      - name: Build Windows (Release)
        run: npx @react-native-community/cli run-windows --release --no-launch
        env:
          CI: true

      - name: Sign MSIX package
        shell: pwsh
        env:
          CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
          CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          # Decode cert from secret
          $certBytes = [Convert]::FromBase64String($env:CERT_PFX)
          [IO.File]::WriteAllBytes("signing.pfx", $certBytes)

          # Find signtool.exe
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          # Sign all MSIX files
          Get-ChildItem -Path "windows" -Recurse -Filter "*.msix" | ForEach-Object {
            Write-Host "Signing $($_.FullName)"
            & $signtool sign /fd SHA256 /a /f signing.pfx /p $env:CERT_PASSWORD $_.FullName
          }

          # Clean up private key
          Remove-Item signing.pfx

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: roulette-windows
          path: windows/*/AppPackages/**/*.msix
          if-no-files-found: warn
